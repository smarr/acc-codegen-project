name: CI

on: [push, pull_request]

jobs:
  build-x86-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Build and test
        run: |
          make
          ./run.sh tests/test.sl
          ./run-example-codegen.sh
          cc codegen/launcher.c
          ./a.out hello-x86_64.bin
          rm hello-x86_64.bin
          
          ./assemble.sh hello-x86_64.asm
          ./a.out hello-x86_64.bin

  build-arm-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Build and test
        run: |
          make
          ./run.sh tests/test.sl
          ./run-example-codegen.sh
          cc codegen/launcher.c
          ./a.out hello-aarch64.bin
          rm hello-aarch64.bin
          
          ./assemble.sh hello-aarch64.asm
          ./a.out hello-aarch64.bin
